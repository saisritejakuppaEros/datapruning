data:
  data_dir: ['/mnt/data0/parth/laoin_dataset']
  image_size: 512
  caption_proportion:
    prompt: 1
    caption: 1
  external_caption_suffixes: []
  external_clipscore_suffixes: []
  clip_thr_temperature: 0.1
  clip_thr: 0.0
  load_text_feat: false
  load_vae_feat: false
  transform: default_train
  type: SanaWebDatasetMS
  sort_dataset: false
# model config
model:
  model: SanaMS_600M_P1_D28
  image_size: 512
  mixed_precision: fp16 # Reverted to Sana default
  fp32_attention: true
  load_from:
  resume_from:
  aspect_ratio_type: ASPECT_RATIO_512
  multi_scale: true
  #pe_interpolation: 1.
  attn_type: linear
  linear_head_dim: 32
  ffn_type: glumbconv
  mlp_acts:
    - silu
    - silu
    - null
  mlp_ratio: 2.5
  use_pe: false
  qk_norm: false
  class_dropout_prob: 0.1
# VAE setting
vae:
  vae_type: AutoencoderDC
  vae_pretrained: mit-han-lab/dc-ae-f32c32-sana-1.1-diffusers
  scale_factor: 0.41407
  vae_latent_dim: 32
  vae_downsample_rate: 32
  sample_posterior: true
# text encoder
text_encoder:
  text_encoder_name: gemma-2-2b-it
  y_norm: true
  y_norm_scale_factor: 0.01
  model_max_length: 300
  # CHI
  chi_prompt: [] 
# Sana schedule Flow
scheduler:
  predict_flow_v: true
  noise_schedule: linear_flow
  pred_sigma: false
  flow_shift: 3.0
  # logit-normal timestep
  weighting_scheme: logit_normal
  logit_mean: 0.0
  logit_std: 1.0
  vis_sampler: flow_dpm-solver
# training setting
train:
  num_workers: 4 # Reduced to 4 as requested (System parameter)
  seed: 1
  train_batch_size: 32 # constrained by user
  num_epochs: 5
  gradient_accumulation_steps: 1
  grad_checkpointing: true
  gradient_clip: 0.1 # Reverted to Sana default
  optimizer:
    betas:
      - 0.9
      - 0.999
      - 0.9999
    eps:
      - 1.0e-30
      - 1.0e-16
    lr: 0.0001 # Reverted to Sana default
    type: CAMEWrapper # Reverted to Sana default
    weight_decay: 0.0 # Reverted to Sana default
  lr_schedule: constant
  lr_schedule_args:
    num_warmup_steps: 2000
  local_save_vis: true # if save log image locally
  visualize: true
  eval_sampling_steps: 2000
  log_interval: 20
  save_model_epochs: 1
  save_model_steps: 100000 # Keep high to start saving storage
  work_dir: output/laion_finetune
  online_metric: false
  eval_metric_step: 2000
  online_metric_dir: metric_helper
